name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pnpm
        run: npm install -g pnpm@9
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint Next.js
        working-directory: ./apps/web
        run: pnpm lint

  test-sdk:
    name: test (sdk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pnpm
        run: npm install -g pnpm@9
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test SDK
        working-directory: ./packages/sdk
        run: pnpm test
      - name: Verify conformance vectors are reproducible
        run: |
          node packages/sdk/scripts/generate-vectors.mjs
          git diff --exit-code -- packages/sdk/merkle-vectors.json packages/sdk/vectors.rs

  test-web:
    name: test (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pnpm
        run: npm install -g pnpm@9
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test web
        working-directory: ./apps/web
        run: pnpm test

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pnpm
        run: npm install -g pnpm@9
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck Next.js
        working-directory: ./apps/web
        run: pnpm tsc --noEmit

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pnpm
        run: npm install -g pnpm@9
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Next.js app
        working-directory: ./apps/web
        run: pnpm build
